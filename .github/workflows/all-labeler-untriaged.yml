name: "Labels: Untriaged"

# New issues are triaged by .github/workflows/issue-triage.yml (which sets
# S: Untriaged itself when it can't classify), so this only covers PRs: any PR
# that opens with no labels gets S: Untriaged until the PR labeler/maintainer
# adds the real ones.

on:
  pull_request_target:
    types: [opened]

jobs:
  add_label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
        if: join(github.event.pull_request.labels) == ''
        with:
          labels: "S: Untriaged"
