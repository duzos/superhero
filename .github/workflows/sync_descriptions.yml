name: Sync project description

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - README.md

jobs:
  modrinth:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Patch Modrinth body
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set -euo pipefail
          jq -Rs '{body: .}' README.md > body.json
          curl --fail-with-body -sS \
            -X PATCH "https://api.modrinth.com/v2/project/VPum1CA1" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @body.json
